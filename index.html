<!DOCTYPE html>
<html>

<head>
    <title>DevOps Monitoring Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>🚀 DevOps Monitoring Dashboard</h1>
</header>

<div class="cards">

    <div class="card cpu">
        <h2>CPU Usage</h2>
        <p id="cpu">0%</p>
    </div>

    <div class="card memory">
        <h2>Memory</h2>
        <p id="memory">0%</p>
    </div>

    <div class="card disk">
        <h2>Disk Usage</h2>
        <p id="disk">0%</p>
    </div>

    <div class="card container">
        <h2>Containers</h2>
        <p id="container">0</p>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
